name: clinic_appointment_app
description: Clinic Appointment App with QR verification
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  
  # UI & State Management
  provider: ^6.1.1
  
  # QR Code
  mobile_scanner: ^3.5.7
  
  # Utilities
  intl: ^0.18.1
  
  # HTTP (if needed)
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true